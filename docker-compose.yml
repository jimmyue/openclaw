version: "3.8"

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    command: node openclaw.mjs gateway --allow-unconfigured
    ports:
      - "18789:18789"
    volumes:
      - ~/.openclaw:/home/node/.openclaw
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-your-token}
      - NODE_OPTIONS=--max-old-space-size=4096  # 增加到 4GB
    deploy:
      resources:
        limits:
          memory: 6g  # 容器内存限制也要相应增加
        reservations:
          memory: 1g
    restart: unless-stopped
